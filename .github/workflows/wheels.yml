name: Wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  wheels:
    name: wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        with:
          package-dir: python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist python --outdir dist
      - name: Verify sdist installs standalone
        run: |
          pip install dist/*.tar.gz
          python -c "import opal; print(opal.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
