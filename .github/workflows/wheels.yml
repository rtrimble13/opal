name: Wheels

# Reusable wheel/sdist build. Invoked by the release workflow on a `v*` tag
# (so artifacts attach to the GitHub Release) and runnable on its own via the
# Actions tab. It deliberately does NOT trigger on tags directly — the release
# workflow calls it, so wheels are built exactly once per tag (issue #19).
on:
  workflow_call:
  workflow_dispatch:

jobs:
  wheels:
    name: wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        with:
          package-dir: python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist python --outdir dist
      - name: Verify sdist installs standalone
        run: |
          pip install dist/*.tar.gz
          python -c "import opal; print(opal.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
