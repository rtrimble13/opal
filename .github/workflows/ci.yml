name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: CLI smoke test
        run: |
          ./build/opal version
          ./build/opal price -S 100 -K 105 -T 0.5 -r 4% -v 22% -t call
          ./build/opal greeks -S 100 -K 100 -T 0.5 -r 5% -v 20% -o json
          ./build/opal portfolio --file examples/book.csv

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install ./python
      - name: Test
        run: python python/tests/test_api.py
